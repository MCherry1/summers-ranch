<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Placeholder — side profile of Hereford cow, TAG 0000">
  <!-- PLACEHOLDER — not a real photo, not a real animal -->
  <defs>
    <linearGradient id="bg0000a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9db58e"/>
      <stop offset="55%" stop-color="#7a9275"/>
      <stop offset="100%" stop-color="#5a6d52"/>
    </linearGradient>
    <linearGradient id="ground0000a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6e5d48"/>
      <stop offset="100%" stop-color="#3d3124"/>
    </linearGradient>
    <linearGradient id="body0000a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9c4a2a"/>
      <stop offset="55%" stop-color="#7a361e"/>
      <stop offset="100%" stop-color="#5a2612"/>
    </linearGradient>
  </defs>

  <!-- Sky / pasture -->
  <rect x="0" y="0" width="1200" height="1100" fill="url(#bg0000a)"/>

  <!-- Ground -->
  <rect x="0" y="1100" width="1200" height="500" fill="url(#ground0000a)"/>

  <!-- Stylized side-profile Hereford body — large, centered -->
  <g transform="translate(200, 720)">
    <!-- Body (red-brown) -->
    <ellipse cx="400" cy="200" rx="360" ry="150" fill="url(#body0000a)"/>
    
    <!-- White underbelly band characteristic of Herefords -->
    <ellipse cx="400" cy="310" rx="340" ry="35" fill="#f0e5d0" opacity="0.9"/>
    
    <!-- Head (white-faced — Hereford signature) -->
    <g transform="translate(700, 140)">
      <ellipse cx="60" cy="50" rx="110" ry="78" fill="url(#body0000a)"/>
      <!-- White face -->
      <ellipse cx="70" cy="55" rx="70" ry="55" fill="#f4ede0"/>
      <!-- Muzzle -->
      <ellipse cx="135" cy="80" rx="25" ry="18" fill="#d4b59a"/>
      <!-- Eye -->
      <circle cx="50" cy="40" r="6" fill="#14100e"/>
      <!-- Ears -->
      <ellipse cx="-20" cy="10" rx="22" ry="30" fill="url(#body0000a)" transform="rotate(-25 -20 10)"/>
      <ellipse cx="10" cy="-10" rx="20" ry="28" fill="url(#body0000a)" transform="rotate(-10 10 -10)"/>
    </g>
    
    <!-- Legs -->
    <rect x="130" y="330" width="38" height="220" rx="8" fill="url(#body0000a)"/>
    <rect x="200" y="330" width="38" height="220" rx="8" fill="url(#body0000a)"/>
    <rect x="540" y="330" width="38" height="220" rx="8" fill="url(#body0000a)"/>
    <rect x="610" y="330" width="38" height="220" rx="8" fill="url(#body0000a)"/>
    
    <!-- White leg socks -->
    <rect x="130" y="500" width="38" height="50" rx="4" fill="#f4ede0"/>
    <rect x="200" y="500" width="38" height="50" rx="4" fill="#f4ede0"/>
    <rect x="540" y="500" width="38" height="50" rx="4" fill="#f4ede0"/>
    <rect x="610" y="500" width="38" height="50" rx="4" fill="#f4ede0"/>
    
    <!-- Tail -->
    <rect x="35" y="140" width="15" height="120" rx="4" fill="url(#body0000a)" transform="rotate(20 35 140)"/>
  </g>

  <!-- Horizon line subtle -->
  <line x1="0" y1="1100" x2="1200" y2="1100" stroke="#5a4e3c" stroke-width="2" opacity="0.4"/>

  <!-- Placeholder watermark -->
  <text x="40" y="1560" font-family="monospace" font-size="20" fill="#f4ede0" opacity="0.7">
    PLACEHOLDER · TAG 0000 · side profile · not real
  </text>
</svg>
