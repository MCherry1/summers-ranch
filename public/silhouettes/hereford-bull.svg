<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Hereford bull silhouette placeholder">
  <rect width="300" height="400" fill="#f7f0e3"/>
  <g fill="#c9b79a" opacity="0.85">
    <!-- body: heavier, thicker neck and shoulders than cow -->
    <path d="M 50 190
             C 45 168, 52 155, 72 152
             L 228 152
             C 252 152, 264 168, 262 195
             L 262 258
             C 262 272, 256 280, 242 282
             L 232 282
             L 230 324
             C 230 332, 226 336, 220 336
             L 210 336
             C 204 336, 200 332, 200 324
             L 200 282
             L 105 282
             L 105 324
             C 105 332, 101 336, 95 336
             L 85 336
             C 79 336, 75 332, 75 324
             L 73 282
             L 68 282
             C 56 280, 48 270, 46 258
             Z"/>
    <!-- head: broader, more masculine -->
