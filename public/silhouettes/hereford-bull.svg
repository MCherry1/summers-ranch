             C 262 160, 282 164, 290 176
             C 296 184, 298 192, 294 202
             C 290 212, 278 216, 268 214
             L 262 214
             L 262 188
             Z"/>
    <!-- shoulder hump (bull trait) -->
    <path d="M 140 152 C 145 140, 160 138, 170 150 L 170 158 L 138 158 Z"/>
    <!-- ear -->
    <path d="M 258 162 C 262 155, 270 156, 272 163 L 270 175 L 260 172 Z"/>
    <!-- tail -->
    <path d="M 46 190 C 38 193, 34 200, 36 210 L 41 222 L 48 212 L 46 200 Z"/>
