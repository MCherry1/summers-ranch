<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Placeholder — three-quarter beauty shot of Hereford cow, TAG 0000">
  <!-- PLACEHOLDER — not a real photo, not a real animal -->
  <defs>
    <linearGradient id="bg0000d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbc8a8"/>
      <stop offset="45%" stop-color="#b89d7a"/>
      <stop offset="100%" stop-color="#8a7258"/>
    </linearGradient>
    <radialGradient id="sun0000d" cx="70%" cy="25%" r="40%">
      <stop offset="0%" stop-color="#ffe8b8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffe8b8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body0000d" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#a5532d"/>
      <stop offset="50%" stop-color="#7a361c"/>
      <stop offset="100%" stop-color="#4d2008"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="1600" fill="url(#bg0000d)"/>
  <rect x="0" y="0" width="1200" height="1600" fill="url(#sun0000d)"/>

  <!-- Three-quarter turned body — head more prominent, more of the chest visible -->
  <g transform="translate(250, 500)">
    <!-- Body (foreshortened) -->
    <ellipse cx="380" cy="280" rx="320" ry="200" fill="url(#body0000d)" transform="rotate(-8 380 280)"/>
    
    <!-- Chest more prominent from angle -->
    <ellipse cx="540" cy="350" rx="140" ry="180" fill="url(#body0000d)"/>
    
    <!-- White chest patch -->
    <ellipse cx="545" cy="400" rx="80" ry="120" fill="#f0e5d0" opacity="0.85"/>
    
    <!-- Head turned toward viewer, prominent -->
    <g transform="translate(530, 80)">
      <!-- Head outline -->
      <ellipse cx="100" cy="130" rx="150" ry="170" fill="url(#body0000d)"/>
      <!-- White face dominant -->
      <ellipse cx="100" cy="140" rx="120" ry="140" fill="#f4ede0"/>
      <!-- Muzzle -->
      <ellipse cx="100" cy="260" rx="50" ry="35" fill="#d4b59a"/>
      <ellipse cx="85" cy="258" rx="8" ry="10" fill="#3a2418" opacity="0.8"/>
      <ellipse cx="115" cy="258" rx="8" ry="10" fill="#3a2418" opacity="0.8"/>
      <!-- Eyes — both visible in 3/4 -->
      <ellipse cx="65" cy="125" rx="10" ry="13" fill="#14100e"/>
      <ellipse cx="135" cy="125" rx="10" ry="13" fill="#14100e"/>
      <circle cx="68" cy="122" r="3" fill="#f4ede0" opacity="0.6"/>
      <circle cx="138" cy="122" r="3" fill="#f4ede0" opacity="0.6"/>
      <!-- Ears -->
      <ellipse cx="-20" cy="70" rx="35" ry="50" fill="url(#body0000d)" transform="rotate(-20 -20 70)"/>
      <ellipse cx="220" cy="70" rx="35" ry="50" fill="url(#body0000d)" transform="rotate(20 220 70)"/>
    </g>
    
    <!-- Front legs visible -->
    <rect x="460" y="490" width="52" height="300" rx="12" fill="url(#body0000d)"/>
    <rect x="560" y="490" width="52" height="300" rx="12" fill="url(#body0000d)"/>
    <rect x="460" y="740" width="52" height="55" rx="6" fill="#f4ede0"/>
    <rect x="560" y="740" width="52" height="55" rx="6" fill="#f4ede0"/>
    
    <!-- One back leg visible at angle -->
    <rect x="140" y="470" width="45" height="290" rx="10" fill="url(#body0000d)" opacity="0.8"/>
    <rect x="140" y="715" width="45" height="45" rx="5" fill="#f4ede0" opacity="0.85"/>
  </g>

  <text x="40" y="1560" font-family="monospace" font-size="20" fill="#14100e" opacity="0.55">
    PLACEHOLDER · TAG 0000 · three-quarter beauty · not real
  </text>
</svg>
