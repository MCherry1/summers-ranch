name: Process Ranch Photos

on:
  push:
    paths:
      - 'images/inbox/**'
      - 'images/cattle/**'
      # sync_archive() reconciles images/cattle/ <-> images/archive/ with
      # cattle-data.json's animals[] / archived[] arrays, so any edit to
      # the JSON (archive / restore) needs to re-run the pipeline.
      - 'cattle-data.json'
  workflow_dispatch:

jobs:
  process-photos:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q imagemagick exiftool
          pip install anthropic 2>/dev/null || true

      - name: Process inbox photos
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 .github/scripts/process_photos.py

      - name: Commit processed photos
        run: |
          git config user.name "Ranch Photo Bot"
          git config user.email "photos@summersranch.com"
          # photo-fingerprints.json is the metadata-fingerprint dedup table
          # maintained by process_photos.py (CLEANUP-SPEC § 1). Include it
          # so the table grows with new uploads and shrinks when animals
          # are archived.
          git add -A images/ cattle-data.json gallery-data.json photo-fingerprints.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No photos to process"
          else
            git commit -m "Auto-process photos: resize, optimize, organize"
            git pull --rebase
            git push
          fi
