name: Process Ranch Photos

on:
  push:
    paths:
      - 'images/inbox/**'
      - 'images/cattle/**'
      # sync_archive() reconciles images/cattle/ <-> images/archive/ with
      # cattle-data.json's animals[] / archived[] arrays, so any edit to
      # the JSON (archive / restore) needs to re-run the pipeline.
      - 'cattle-data.json'
  workflow_dispatch:

jobs:
  process-photos:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          # imagemagick for resize/strip, exiftool for metadata,
          # libheif-examples provides heif-convert for HEIC→JPEG preconversion
          # (iOS shares HEIC by default; ImageMagick on stock Ubuntu doesn't
          # always have HEIC delegate support built in, so we preconvert).
          sudo apt-get install -y -q imagemagick exiftool libheif-examples
          pip install anthropic 2>/dev/null || true

      - name: Process inbox photos
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 .github/scripts/process_photos.py
        
      - name: Commit processed photos
        run: |
          set -e
          git config user.name "Ranch Photo Bot"
          git config user.email "photos@mrsummersranch.com"
          # git add each path individually so missing files (e.g. gallery-data.json
          # before any gallery photos are classified) don't fail the whole step.
          git add -A images/
          [ -f cattle-data.json ] && git add cattle-data.json || true
          [ -f photo-fingerprints.json ] && git add photo-fingerprints.json || true
          [ -f gallery-data.json ] && git add gallery-data.json || true
          if git diff --staged --quiet; then
            echo "No photos to process"
          else
            git commit -m "Auto-process photos: resize, optimize, organize"
            for i in 1 2 3; do
              git pull --rebase && git push && break
              echo "Push attempt $i failed, retrying in 5s..."
              sleep 5
            done
          fi
